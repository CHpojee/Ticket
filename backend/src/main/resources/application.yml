spring:
  application:
    name: it-support
  datasource:
    url: jdbc:h2:mem:itsupport;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-please-32bytes-minimum-secret-key}
    ttl-seconds: 28800
  mail:
    from: it-support@standard-insurance.com
    domain: standard-insurance.com
  specs:
    dir: ${SPECS_DIR:../docs/specs}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.standardinsurance.itsupport: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
  h2:
    console:
      enabled: false
